<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<title>เงาแยกร่าง</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    background: #000;
    height: 100%;
    overflow: hidden;
  }
  video { display: none; }
  canvas {
    display: block;
    margin: 0 auto;
    width: 100vw;
    height: 100vh;
    object-fit: contain;
  }
</style>
</head>
<body>

<video id="video" autoplay playsinline muted></video>
<canvas id="out" width="640" height="480"></canvas>

<script>
const video = document.getElementById('video');
const out = document.getElementById('out');
const ctx = out.getContext('2d');

// ---- ค่าคงที่ (ปรับตรงนี้ในโค้ดได้ถ้าต้องการ ไม่มี UI) ----
const NUM_CLONES = 6;
const LAG = 4;          // ห่างกันกี่เฟรมต่อร่าง
const SPREAD_X = 40;    // ระยะห่างแนวนอน
const SPREAD_Y = 15;    // ระยะห่างแนวตั้ง
const MIN_ALPHA = 0.15; // ความโปร่งของร่างเก่าสุด
const MIRROR = true;
// ------------------------------------------------------

const RING_SIZE = NUM_CLONES * LAG + 1;
const ring = [];
for (let i = 0; i < RING_SIZE; i++) {
  const c = document.createElement('canvas');
  c.width = out.width;
  c.height = out.height;
  ring.push(c);
}

let frameCounter = 0;

navigator.mediaDevices.getUserMedia({ video: { width: 640, height: 480 }, audio: false })
  .then((stream) => {
    video.srcObject = stream;
    return video.play();
  })
  .then(() => {
    requestAnimationFrame(loop);
  })
  .catch((err) => {
    console.error('เปิดกล้องไม่ได้:', err);
  });

function loop() {
  // วาดเฟรมปัจจุบันลง ring buffer
  const slot = ring[frameCounter % RING_SIZE];
  const sctx = slot.getContext('2d');
  sctx.save();
  if (MIRROR) {
    sctx.translate(slot.width, 0);
    sctx.scale(-1, 1);
  }
  sctx.drawImage(video, 0, 0, slot.width, slot.height);
  sctx.restore();

  // ประกอบภาพเงาแยกร่างจากเก่าสุดไปใหม่สุด
  ctx.clearRect(0, 0, out.width, out.height);
  for (let i = NUM_CLONES - 1; i >= 0; i--) {
    const framesBack = i * LAG;
    if (frameCounter - framesBack < 0) continue;
    const idx = (frameCounter - framesBack) % RING_SIZE;
    const frame = ring[idx];

    const t = NUM_CLONES <= 1 ? 1 : 1 - (i / (NUM_CLONES - 1));
    const alpha = MIN_ALPHA + (1 - MIN_ALPHA) * t;
    const offsetX = i * SPREAD_X * (i % 2 === 0 ? 1 : -1) * 0.6;
    const offsetY = i * SPREAD_Y * 0.5;

    ctx.globalAlpha = alpha;
    ctx.drawImage(frame, offsetX, offsetY, out.width, out.height);
  }
  ctx.globalAlpha = 1;

  frameCounter++;
  requestAnimationFrame(loop);
}
</script>
</body>
</html>
